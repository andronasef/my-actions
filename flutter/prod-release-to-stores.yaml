name: Google Play Production Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ✅ allow creating releases

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Cache pub deps
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION }}
          channel: stable

      - name: 📥 Get dependencies
        run: flutter pub get

      - name: 🔍 Flutter Doctor
        run: flutter doctor

      - name: 🏗️ Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🔐 Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: key.jks
          fileDir: "./android/app"
          encodedString: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: 📝 Download google-services.json
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: google-services.json
          fileDir: ./android/app
          encodedString: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: 📝 Create key.properties
        run: |
          echo "storeFile=key.jks" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties

      # 📂 Create a directory to store artifacts safely
      - name: 📂 Create Artifacts Directory
        run: mkdir -p release_artifacts

      # 1️⃣ Build AAB -> Copy -> Clean
      - name: 📦 Build Android App Bundle
        run: |
          flutter build appbundle
          cp build/app/outputs/bundle/release/app-release.aab release_artifacts/

      - name: ♻ Flutter Clean (Free Space)
        run: flutter clean

      # 2️⃣ Build Release APK -> Copy -> Clean
      - name: 📱 Build Android APK (Release)
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk release_artifacts/

      - name: ♻ Flutter Clean (Free Space)
        run: flutter clean

      # 3️⃣ Build Debug APK -> Copy
      - name: 🐛 Build Android APK (Debug)
        run: |
          flutter build apk --debug
          cp build/app/outputs/flutter-apk/app-debug.apk release_artifacts/

      # Setup Ruby for Fastlane
      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.5"

      - name: 📦 Cache bundle dependencies
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-

      - name: 📥 Download bundle dependencies
        run: |
          gem install bundler
          bundle config path vendor/bundle
          bundle install

      # 🚀 Upload using the copy in release_artifacts

      - name: 📝 Download Google play developer google-services.json
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: google-services.json
          fileDir: ./fastlane
          encodedString: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      - name: 🚀 Release to Google Play
        run: |
          bundle exec fastlane supply \
            --json_key ./fastlane/google-services.json \
            --package_name "${{ secrets.ANDROID_PACKAGE_NAME }}" \
            --aab release_artifacts/app-release.aab \
            --track production
      - name: 🏷️ Get app version
        id: get_version
        run: |
          RAW_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo $RAW_VERSION | cut -d+ -f1)   
          BUILD=$(echo $RAW_VERSION | cut -d+ -f2)     
          TAG="v${VERSION}-${BUILD}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🏷️ GitHub Release using the copies in release_artifacts
      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            🚀 Production release published to Google Play.
            - Version: ${{ steps.get_version.outputs.version }}
          files: |
            release_artifacts/app-release.aab
            release_artifacts/app-release.apk
            release_artifacts/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
